<!DOCTYPE html>
<html>
<head>
<title>Minty Games</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:10px;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
background:#2a2a2a;
}

a{
color:white;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<h1>Minty Games</h1>
<p>Free browser games</p>

<div class="grid">

<div class="card"><a href="https://play2048.co/">2048</a></div>
<div class="card"><a href="https://agar.io/">Agar.io</a></div>
<div class="card"><a href="https://slither.io/">Slither.io</a></div>
<div class="card"><a href="https://krunker.io/">Krunker</a></div>
<div class="card"><a href="https://paper-io.com/">Paper.io</a></div>
<div class="card"><a href="https://shellshock.io/">Shell Shockers</a></div>

</div>

</body>
</html>
<div class="card"><a href="https://itch.io/games/html5">200+ Browser Games</a></div>
